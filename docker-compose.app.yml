services:
  app:
    container_name: fastapi_app
    build:
      context: .
      target: dev # Use the 'dev' stage from the Dockerfile
    command: bash -c "alembic upgrade head && fastapi dev src/main.py --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    ports:
      - "8000:8000"  
    environment:
      RUNNING_IN_DOCKER: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health-check/')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - fastapi_net

  postgres:
    container_name: postgres
    image: postgres:17-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - fastapi_net

  dbgate:
    container_name: dbgate
    image: dbgate/dbgate:alpine
    restart: unless-stopped
    ports:
      - "18581:3000"
    environment:
      CONNECTIONS: con1
      LABEL_con1: "FastAPI Project"
      SERVER_con1: postgres
      USER_con1: ${POSTGRES_USER}
      PASSWORD_con1: ${POSTGRES_PASSWORD}
      PORT_con1: ${POSTGRES_PORT}
      ENGINE_con1: postgres@dbgate-plugin-postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fastapi_net

volumes:
  postgres_data:

networks:
  fastapi_net:
    external: true