events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Upstream for FastAPI cluster (4 replicas according to compose)
    upstream fastapi_app {
        server app:8000;
    }

    # 1. BLOQUE POR DEFECTO (Seguridad): Rechaza hosts desconocidos
    server {
        listen 80 default_server;
        server_name _;
        return 444; 
    }

    # 2. BLOQUE DE LA APLICACIÓN
    server {
        listen 80;
        
        # Sincronizado con ALLOWED_HOSTS de .env.example
        server_name localhost 127.0.0.1 nginx milocal.com *.milocal.com; 

        client_max_body_size 10M;

        location / {
            proxy_pass http://fastapi_app;
            
            # Encabezados para consistencia con CORSMiddleware y TrustedHostMiddleware
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_redirect off;
            add_header X-Backend-Server $upstream_addr;
        }

        # Monitoreo SRE
        location /stub_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12; # Docker network
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }
    }
}
