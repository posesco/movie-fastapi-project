services:
  # Database for metrics (time series)
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.3.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fastapi_net

  # Visual interface for dashboards and data analysis
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:11.6.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
    volumes:
      - ./monitoring/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - fastapi_net

  # Storage and query system for logs
  loki:
    container_name: loki
    image: grafana/loki:3.5.1
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - fastapi_net

  # Backend for trace storage and search (tracing)
  tempo:
    container_name: tempo
    image: grafana/tempo:2.10.4
    command: ["-config.file=/etc/tempo.yaml", "-target=all"]
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
    #   interval: 10s
    #   timeout: 5s
    #   start_period: 20s
    #   retries: 5
    networks:
      - fastapi_net

  # Central collector: receives, processes and distributes logs, metrics and traces
  alloy:
    container_name: alloy
    image: grafana/alloy:v1.15.1
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=experimental # Enable all functionality
    restart: unless-stopped
    ports:
      - "12345:12345"
      # - "4319:4317"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LOKI_HOST: loki:3100
      TEMPO_HOST: tempo:4317
      ALLOY_OTLP_UPSTREAM: tempo:4317
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    # depends_on:
    #   tempo:
    #     condition: service_healthy
    networks:
      - fastapi_net

  # Tool that validates and monitors the health/performance of Tempo
  vulture:
    container_name: vulture
    image: grafana/tempo-vulture:2.10.4
    command:
      - -prometheus-listen-address=:8080
      - -tempo-query-url=http://tempo:3200
      - -tempo-push-url=http://tempo:4317
      - -tempo-org-id=vulture-tenant
    restart: unless-stopped
    depends_on:
      tempo:
        condition: service_healthy
    networks:
      - fastapi_net

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:

networks:
  fastapi_net: