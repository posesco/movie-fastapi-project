services:
  alertmanager:
      container_name: alertmanager
      image: prom/alertmanager:v0.32.1
      restart: unless-stopped
      command:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager
      ports:
        - "9093:9093"
      volumes:
        - ./config/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      networks:
        - fastapi_net

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.11.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/prometheus/rules:/etc/prometheus/rules:ro 
      - prometheus_data:/prometheus
    networks:
      - fastapi_net

  # Visual interface for dashboards and data analysis
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:13.0.1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_DISABLE_SIGNOUT_MENU: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor metricsSummary
    volumes:
      - ./config/monitoring/grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./config/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - fastapi_net

  # Storage and query system for logs
  loki:
    container_name: loki
    image: grafana/loki:3.6.10
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./config/monitoring/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - fastapi_net

  # Backend for trace storage and search (tracing)
  tempo:
    container_name: tempo
    image: grafana/tempo:2.10.5
    command: ["-config.file=/etc/tempo.yaml", "-target=all"]
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    volumes:
      - ./config/monitoring/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - fastapi_net

  # Central collector: receives, processes and distributes logs, metrics and traces
  alloy:
    container_name: alloy
    image: grafana/alloy:v1.16.0
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=experimental # Enable all functionality
    restart: unless-stopped
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LOKI_HOST: loki:3100
      TEMPO_HOST: tempo:4317
      ALLOY_OTLP_UPSTREAM: tempo:4317
    volumes:
      - ./config/monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    networks:
      - fastapi_net

  # Tool that validates and monitors the health/performance of Tempo
  vulture:
    container_name: vulture
    image: grafana/tempo-vulture:2.10.5
    command:
      - -prometheus-listen-address=:8080
      - -tempo-query-url=http://tempo:3200
      - -tempo-push-url=http://tempo:4317
      - -tempo-org-id=vulture-tenant
    restart: unless-stopped
    networks:
      - fastapi_net

  # Nginx Exporter
  nginx_exporter:
    container_name: nginx_exporter
    image: nginx/nginx-prometheus-exporter:1.5.1
    command:
      - -nginx.scrape-uri=http://nginx:80/stub_status
    restart: unless-stopped
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - fastapi_net

  # Redis Exporter
  redis_exporter:
    container_name: redis_exporter
    image: oliver006/redis_exporter:v1.83.0-alpine
    command:
      - --redis.addr=redis://redis:6379
      - --redis.password=${REDIS_PASSWORD}
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - fastapi_net

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9100:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - fastapi_net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonarqube-db:
    image: postgres:17-alpine
    container_name: sonarqube-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastapi_net


volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_db:


networks:
  fastapi_net: